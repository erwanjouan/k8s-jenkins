- name: Add Jenkins Helm repo
  kubernetes.core.helm_repository:
      name: jenkins
      #force_update: true
      repo_url: https://charts.jenkins.io

- name: Install Jenkins Helm Chart
  kubernetes.core.helm:
      name: '{{ jenkins.service_name }}'
      release_namespace: '{{ k8s_namespace.build }}'
      chart_ref: jenkins/jenkins
      wait: true
      values:
        controller:
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          extraEnvs:
            - name: SONARQUBE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: '{{ sonarqube.token_secret }}'
                  key: token
                  optional: true
          installPlugins: # base plugins should be specified when using this entry
            - kubernetes
            - git
            - configuration-as-code
            - workflow-multibranch
            - workflow-aggregator
            - workflow-cps-global-lib
            - sonar
            - job-dsl # added to persist jobs
          JCasC:
            configScripts:
              welcome-message: |
                jenkins:
                  systemMessage: Welcome to k8s-cicd
                  authorizationStrategy: unsecured
              sonarqube-config: |
                unclassified:
                  sonarGlobalConfiguration:
                    buildWrapperEnabled: false
                    installations:
                      - name: SonarQube
                        serverUrl: http://{{ sonarqube.service_name }}:{{ sonarqube.port }}
                        credentialsId: sonarqube-token
                credentials:
                  system:
                    domainCredentials:
                      - credentials:
                          - string:
                              scope: GLOBAL
                              id: sonarqube-token
                              secret: "${SONARQUBE_TOKEN}"
                              description: SonarQube analysis token
              shared-library: |
                unclassified:
                  globalLibraries:
                    libraries:
                      - name: k8s-cicd
                        defaultVersion: main
                        allowVersionOverride: true
                        retriever:
                          modernSCM:
                            scm:
                              git:
                                remote: https://github.com/erwanjouan/k8s-jenkins.git
              scheduler-job: |
                jobs:
                  - script: >
                      multibranchPipelineJob('scheduler') {
                          branchSources {
                              git {
                                  id('scheduler')
                                  remote('https://github.com/erwanjouan/test-tool-backend.git')
                              }
                          }
                          factory {
                            workflowBranchProjectFactory {
                                scriptPath('cicd/Jenkinsfile')
                            }
                          }
                      }
