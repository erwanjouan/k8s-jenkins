- name: Create deployment Role in run namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: deployment-manager
        namespace: '{{ k8s_namespace.run }}'
      rules:
        - apiGroups: [ "apps" ]
          resources: [ "deployments" ]
          verbs: [ "*" ]

- name: Bind Role to ci service account
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: deployment-manager-binding
        namespace: '{{ k8s_namespace.run }}'
      subjects:
        - kind: ServiceAccount
          name: default
          namespace: '{{ k8s_namespace.build }}'
      roleRef:
        kind: Role
        name: deployment-manager
        apiGroup: rbac.authorization.k8s.io