- name: Delete build namespace
  kubernetes.core.k8s:
    name: '{{ k8s_namespace.build }}'
    api_version: v1
    kind: Namespace
    state: absent
  ignore_errors: yes

- name: Delete run namespace
  kubernetes.core.k8s:
    name: '{{ k8s_namespace.run }}'
    api_version: v1
    kind: Namespace
    state: absent
  ignore_errors: yes
