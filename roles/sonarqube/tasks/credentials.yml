- name: Check if sonarqube-token secret already exists
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: '{{ k8s_namespace.build }}'
    name: '{{ sonarqube.token_secret }}'
  register: sonarqube_secret_check

- name: Find SonarQube pod
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: '{{ k8s_namespace.build }}'
    label_selectors:
      - release={{ sonarqube.release_name }}
  register: sonarqube_pod
  when: sonarqube_secret_check.resources | length == 0

- name: Wait for SonarQube web UI to be UP
  ansible.builtin.shell:
    cmd: >
      kubectl exec -n {{ k8s_namespace.build }}
      {{ sonarqube_pod.resources[0].metadata.name }}
      -- curl -sf http://localhost:{{ sonarqube.port }}/api/system/status
  register: sonarqube_status
  until: sonarqube_status.rc == 0 and 'UP' in sonarqube_status.stdout
  retries: 30
  delay: 10
  when: sonarqube_secret_check.resources | length == 0

- name: Generate SonarQube token for Jenkins
  ansible.builtin.shell:
    cmd: >
      kubectl exec -n {{ k8s_namespace.build }}
      {{ sonarqube_pod.resources[0].metadata.name }}
      -- curl -sf -u admin:admin -X POST
      'http://localhost:{{ sonarqube.port }}/api/user_tokens/generate?name=jenkins'
  register: sonarqube_token_response
  when: sonarqube_secret_check.resources | length == 0

- name: Store SonarQube token as Kubernetes secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: '{{ sonarqube.token_secret }}'
        namespace: '{{ k8s_namespace.build }}'
      stringData:
        token: '{{ (sonarqube_token_response.stdout | from_json).token }}'
  when: sonarqube_secret_check.resources | length == 0

- name: Configure SonarQube webhook to notify Jenkins
  ansible.builtin.shell:
    cmd: >
      kubectl exec -n {{ k8s_namespace.build }}
      {{ sonarqube_pod.resources[0].metadata.name }}
      -- curl -sf -u admin:admin -X POST
      'http://localhost:{{ sonarqube.port }}/api/webhooks/create'
      -d 'name=Jenkins&url=http://{{ jenkins.service_name }}:{{ jenkins.port }}/sonarqube-webhook/'
  when: sonarqube_secret_check.resources | length == 0

- name: Find SonarQube pod for permission setup
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: '{{ k8s_namespace.build }}'
    label_selectors:
      - release={{ sonarqube.release_name }}
  register: sonarqube_pod_current

- name: Grant anonymous Execute Analysis permission globally
  ansible.builtin.shell:
    cmd: >
      kubectl exec -n {{ k8s_namespace.build }}
      {{ sonarqube_pod_current.resources[0].metadata.name }}
      -- curl -sf -u admin:admin -X POST
      'http://localhost:{{ sonarqube.port }}/api/permissions/add_group'
      -d 'groupName=Anyone&permission=scan'
  changed_when: false
