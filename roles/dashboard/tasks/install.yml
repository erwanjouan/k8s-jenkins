- name: Add K8s-Dashboard Helm repo
  kubernetes.core.helm_repository:
      name: kubernetes-dashboard
      force_update: true
      repo_url: https://kubernetes-retired.github.io/dashboard/

- name: Install K8s-Dashboard Helm Chart
  kubernetes.core.helm:
      name: kubernetes-dashboard
      release_namespace: kubernetes-dashboard
      create_namespace: true
      chart_ref: kubernetes-dashboard/kubernetes-dashboard
      wait: true

- name: Creating Service Account
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: admin-user
        namespace: kubernetes-dashboard

- name: Creating a ClusterRoleBinding
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: admin-user
        namespace: kubernetes-dashboard
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cluster-admin
      subjects:
        - kind: ServiceAccount
          name: admin-user
          namespace: kubernetes-dashboard

- name: Get token
  ansible.builtin.shell: kubectl -n kubernetes-dashboard create token admin-user
  register: token
  become: no

- name: Print dashboard token
  debug:
    msg: "{{ token.stdout }}"
