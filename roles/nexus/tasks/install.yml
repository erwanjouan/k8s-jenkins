- name: Add Nexus helm repo
  kubernetes.core.helm_repository:
    name: sonatype
    repo_url: https://sonatype.github.io/helm3-charts/

- name: Install Nexus Helm Chart
  kubernetes.core.helm:
    name: '{{ nexus.service_name }}'
    release_namespace: '{{ k8s_namespace.build }}'
    chart_ref: sonatype/nexus-repository-manager
    wait: true
    values:
      nexus:
        env:
          - name: INSTALL4J_ADD_VM_PARAMS
            value: "-Xms256m -Xmx1g -XX:MaxDirectMemorySize=512m -Djava.util.prefs.userRoot=/nexus-data/javaprefs"
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
