- name: Check if nexus-admin secret already exists
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: '{{ k8s_namespace.build }}'
    name: nexus-admin
  register: nexus_secret_check

- name: Search for Nexus Pod
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: '{{ k8s_namespace.build }}'
    label_selectors:
      - app.kubernetes.io/name = nexus-repository-manager
      - app.kubernetes.io/instance = {{ nexus.service_name }}
  register: nexus_pod
  when: nexus_secret_check.resources | length == 0

- name: Get Nexus admin password from file
  kubernetes.core.k8s_exec:
    namespace: '{{ k8s_namespace.build }}'
    pod: '{{ nexus_pod.resources[0].metadata.name }}'
    command: /bin/cat /nexus-data/admin.password
  register: nexus_password_file
  when: nexus_secret_check.resources | length == 0

- name: Store Nexus admin password as secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: nexus-admin
        namespace: '{{ k8s_namespace.build }}'
      stringData:
        password: '{{ nexus_password_file.stdout | trim }}'
  when: nexus_secret_check.resources | length == 0

- name: Enable Nexus anonymous access
  kubernetes.core.k8s_exec:
    namespace: '{{ k8s_namespace.build }}'
    pod: '{{ nexus_pod.resources[0].metadata.name }}'
    command:
      - curl
      - -sf
      - -u
      - "admin:{{ nexus_password_file.stdout | trim }}"
      - -X
      - PUT
      - -H
      - "Content-Type: application/json"
      - -d
      - '{"enabled":true,"userId":"anonymous","realmName":"NexusAuthorizingRealm"}'
      - "http://localhost:{{ nexus.port }}/service/rest/v1/security/anonymous"
  when: nexus_secret_check.resources | length == 0

- name: Find Nexus pod
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: '{{ k8s_namespace.build }}'
    label_selectors:
      - app.kubernetes.io/name = nexus-repository-manager
      - app.kubernetes.io/instance = {{ nexus.service_name }}
  register: nexus_pod_current

- name: Get Nexus admin password from secret
  ansible.builtin.shell:
    cmd: kubectl get secret nexus-admin -n {{ k8s_namespace.build }} -o jsonpath='{.data.password}' | base64 -d
  register: nexus_admin_pass
  changed_when: false

- name: Grant anonymous user admin role in Nexus
  ansible.builtin.shell:
    cmd: >
      kubectl exec -n {{ k8s_namespace.build }}
      {{ nexus_pod_current.resources[0].metadata.name }}
      -- curl -sf
      -u "admin:{{ nexus_admin_pass.stdout }}"
      -X PUT 'http://localhost:{{ nexus.port }}/service/rest/v1/security/users/anonymous'
      -H 'Content-Type: application/json'
      -d '{"userId":"anonymous","firstName":"Anonymous","lastName":"User","emailAddress":"anonymous@example.org","source":"default","status":"active","readOnly":false,"roles":["nx-admin"]}'
  changed_when: false

- name: Create Maven settings secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: '{{ jenkins.m2_settings_secretname }}'
        namespace: '{{ k8s_namespace.build }}'
      stringData:
        settings.xml: |
          <settings>
            <mirrors>
              <mirror>
                <id>nexus</id>
                <mirrorOf>*</mirrorOf>
                <url>http://{{ nexus.service_name }}:{{ nexus.port }}/repository/maven-public/</url>
              </mirror>
            </mirrors>
          </settings>

- name: Print Nexus credentials
  debug:
    msg: >-
      Nexus URL: http://{{ nexus.host }} | admin password: {{
        (nexus_secret_check.resources[0].data.password | b64decode)
        if nexus_secret_check.resources | length > 0
        else nexus_password_file.stdout }}
